apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k6-manager.serviceAccountName" . }}
  namespace: {{ include "k6-manager.namespace" . }}
  labels:
    {{- include "k6-manager.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
