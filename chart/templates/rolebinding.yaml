{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "k6-manager.fullname" . }}
  namespace: {{ include "k6-manager.namespace" . }}
  labels:
    {{- include "k6-manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "k6-manager.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k6-manager.serviceAccountName" . }}
    namespace: {{ include "k6-manager.namespace" . }}
{{- end }}
